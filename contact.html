        /* =========================================
           CONTACT PAGE SPECIFIC STYLES
           ========================================= */
        .contact-container {
            max-width: 48rem;
            margin: 0 auto;
        }

        .contact-heading {
            font-size: clamp(2.25rem, 5vw, 3rem);
            font-weight: 800;
            text-align: center;
            margin-bottom: 2rem;
            padding-top: 1.25rem;
            background: linear-gradient(to right, #14b8a6, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .contact-form {
            border-radius: 1.5rem;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-weight: 600;
            margin-left: 0.25rem;
        }

        .form-input {
            width: 100%;
            background: rgba(241, 245, 249, 1);
            border: 1px solid rgba(203, 213, 225, 1);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--text-main);
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        [data-theme="dark"] .form-input {
            background: rgba(30, 41, 59, 0.5);
            border-color: rgba(51, 65, 85, 1);
        }

        .form-input:focus {
            border-color: #14b8a6;
            box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.2);
        }

        .form-input:disabled {
            background: rgba(226, 232, 240, 1);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        [data-theme="dark"] .form-input:disabled {
            background: rgba(15, 23, 42, 0.5);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: #14b8a6;
            /* teal-500 */
            color: white;
            font-weight: 700;
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            font-size: 1.125rem;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            background: #2dd4bf;
            /* teal-400 */
            box-shadow: 0 10px 15px -3px rgba(20, 184, 166, 0.5);
        }

        @media (min-width: 1024px) {
            main {
                max-width: 95%;
                padding-inline: 40px;
            }
        }

        .navbar-glow {
            animation: pulse-border 1.5s ease-in-out infinite alternate;
        }

        .footer-social {
            display: flex;
            flex-direction: column;
            /* Stacks links row and text vertically */
            align-items: center;
            /* Centers everything */
            gap: 10px;
            /* Space between icons and text */
            font-family: sans-serif;
        }

        .social-links-row {
            display: flex;
            /* Keeps icons in a single horizontal line */
            gap: 20px;
            /* Space between each icon */
        }

        .social-links-row a {
            /* color: inherit; */
            /* Takes color from parent or remains default */
            text-decoration: none;
        }

        .designer-tag {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 768px) {

            }
        }

                width: 95px;
                height: 50px;
            }
        }

        a,
        button,.like-container {
            -webkit-tap-highlight-color: transparent;
        }

    <script>
        // contact page js 
        document.addEventListener('DOMContentLoaded', () => {
            const contactForm = document.getElementById('contact-form');

            contactForm.addEventListener('submit', (e) => {
                e.preventDefault();

                // 1. Get form data
                const formData = new FormData(e.target);
                const name = formData.get("name");
                const email = formData.get("email");
                const message = formData.get("message");

                const targetEmail = "hod_aiml@jnnce.ac.in";

                // 2. Construct subject & body
                const subject = `Feedback from ${name}`;
                const body =
                    `Name: ${name}\n` +
                    `Sender Email: ${email}\n\n` +
                    `Message:\n${message}`;

                // 3. Encode for URLs
                const encodedSubject = encodeURIComponent(subject);
                const encodedBody = encodeURIComponent(body);

                // 4. Try opening MAIL APP first (mailto)
                const mailtoLink = `mailto:${targetEmail}?subject=${encodedSubject}&body=${encodedBody}`;

                // 5. Gmail fallback
                const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${targetEmail}&su=${encodedSubject}&body=${encodedBody}`;

                // 6. Smart handling
                const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

                if (isMobile) {
                    // Mobile devices → mail apps almost always exist
                    window.location.href = mailtoLink;
                } else {
                    // Desktop → try mailto, fallback to Gmail
                    const iframe = document.createElement("iframe");
                    iframe.style.display = "none";
                    iframe.src = mailtoLink;
                    document.body.appendChild(iframe);

                    // fallback after delay
                    setTimeout(() => {
                        window.open(gmailUrl, "_blank");
                    }, 1200);
                }
            });
        });
    </script>
